<!DOCTYPE html>
<html lang="id">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #1a2a6c, #b21f1f, #fdbb2d, #6a11cb);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

   #movingBanner {
    position: relative;
    background: linear-gradient(90deg, #4facfe, #00f2fe); /* gradien biru-ungu */
    color: white;
    text-align: center;
    padding: 15px 20px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px;
    margin: 20px auto;
    max-width: 90%;
    cursor: pointer;

    /* Animasi lebih lambat */
    animation: slideBounce 6s infinite alternate; /* dari 3s → 6s */
}

@keyframes slideBounce {
    0%   { transform: translateX(0) translateY(0); }
    25%  { transform: translateX(10px) translateY(-5px); }
    50%  { transform: translateX(-10px) translateY(5px); }
    75%  { transform: translateX(5px) translateY(-2px); }
    100% { transform: translateX(0) translateY(0); }
}

#movingBanner:hover {
    background: linear-gradient(90deg, #3a8edb, #00d4fe); /* hover sedikit gelap */
}

#modernPopup {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(50,50,50,0.95);
    color: white;
    padding: 20px 25px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    font-size: 16px;
    text-align: center;
    z-index: 3000;
    width: 90%;
    max-width: 350px;
    display: none;
}

#modernPopup button {
    position: absolute;
    top: 5px;
    right: 10px;
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

    body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

text-align: center;

}

#musicBtn {

    right: 5vw;             /* jarak dari kanan layar */

    height: 14vw;           /* ukuran responsif */

    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7vw;
    border: none;
    cursor: pointer;
    z-index: 1000;
    animation: none;        /* pastikan animasi OFF */
}

#musicBtn:hover {
    background-color: #666666;
}

.logo {
    font-size: 28px;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 
        0 0 5px #00f0ff,
        0 0 10px #00f0ff,
        0 0 20px #00f0ff;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow: 0 0 5px #00f0ff;
    }
    to {
        text-shadow: 0 0 20px #00f0ff;
    }
}

.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    overflow: hidden;
    z-index: -1;
}

.stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: moveStars linear infinite;
    box-shadow: 0 0 6px white;
}

@keyframes moveStars {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-1000px);
        opacity: 0;
    }
}

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
        opacity: 0;
        animation: fadeIn 1s ease forwards;
    }

    .delay-1 { animation-delay: 0.3s; }
    .delay-2 { animation-delay: 0.6s; }
    .delay-3 { animation-delay: 0.9s; }

    .profile {
        padding: 40px 20px;
    }

    .profile img {
    width: 100px;
    height: 100px;
    border-radius: 10px;
box-shadow: 0 0 15px rgba(255,255,255,0.5);
    object-fit: cover;
}

    h1 { margin: 10px 0 5px; }

    .bio {
        font-size: 14px;
        opacity: 0.8;
    }

    .links {
        margin-top: 30px;
    }

    .links a {
        display: block;
        background: white;
        color: black;
        text-decoration: none;
        padding: 12px;
        margin: 12px auto;
        width: 80%;
        max-width: 300px;
        border-radius: 30px;
        font-weight: bold;
        position: relative;
        overflow: hidden;
        transition: 0.2s;
    }

    .links a:hover {
        transform: scale(1.07);
    }

    .links a::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
        transition: 0.5s;
    }

    .links a:hover::before {
        left: 100%;
    }

    .links a:active {
        transform: scale(0.92);
        box-shadow: inset 0 3px 8px rgba(0,0,0,0.4);
    }


    footer {
        margin-top: 30px;
        font-size: 12px;
        opacity: 0.7;
    }


</style>

<script>
  
  
  const movingBanner = document.getElementById('movingBanner');
movingBanner.addEventListener('click', () => {
    window.open('https://chat.whatsapp.com/I6Nd6jZjSxjIHMRhvedox0?mode=gi_t', '_blank'); // ganti nomor WA
});

window.addEventListener('load', () => {
    const popup = document.getElementById('modernPopup');
    const closeBtn = document.getElementById('closeModernPopup');

    // Munculkan pop-up 2 detik setelah halaman dimuat
    setTimeout(() => {
        popup.style.display = 'block';
    }, 2000);

    // Tutup pop-up saat tombol diklik
    closeBtn.addEventListener('click', () => {
        popup.style.display = 'none';
    });
});
  
const music = document.getElementById("bg-music");
const btn = document.getElementById("musicBtn");

music.volume = 0.3;

function toggleMusic() {
    const icon = btn.querySelector('i');
    if (music.paused) {
        music.play();
        icon.classList.remove('fa-play');
        icon.classList.add('fa-pause');
    } else {
        music.pause();
        icon.classList.remove('fa-pause');
        icon.classList.add('fa-play');
    }
}

btn.addEventListener('click', toggleMusic);

</script>
