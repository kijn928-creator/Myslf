<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Brilxix</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #000000, #0a0f2c);
    color: white;
text-align: center;
        overflow-x: hidden;
}

    /* BACKGROUND BINTANG */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    overflow: hidden;
    z-index: -1;
}

.stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: moveStars linear infinite;
}

@keyframes moveStars {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-1000px);
        opacity: 0;
    }
}
    /* FADE IN */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
        opacity: 0;
        animation: fadeIn 1s ease forwards;
    }

    .delay-1 { animation-delay: 0.3s; }
    .delay-2 { animation-delay: 0.6s; }
    .delay-3 { animation-delay: 0.9s; }

    .profile {
        padding: 40px 20px;
    }

    .profile img {
    width: 100px;
    height: 100px;
    border-radius: 10px;
box-shadow: 0 0 15px rgba(255,255,255,0.5);
    object-fit: cover;
}

    h1 { margin: 10px 0 5px; }

    .bio {
        font-size: 14px;
        opacity: 0.8;
    }

    .links {
        margin-top: 30px;
    }

    .links a {
        display: block;
        background: white;
        color: black;
        text-decoration: none;
        padding: 12px;
        margin: 12px auto;
        width: 80%;
        max-width: 300px;
        border-radius: 30px;
        font-weight: bold;
        position: relative;
        overflow: hidden;
        transition: 0.2s;
    }

    .links a:hover {
        transform: scale(1.07);
    }

    .links a::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
        transition: 0.5s;
    }

    .links a:hover::before {
        left: 100%;
    }

    .links a:active {
        transform: scale(0.92);
        box-shadow: inset 0 3px 8px rgba(0,0,0,0.4);
    }

    footer {
        margin-top: 30px;
        font-size: 12px;
        opacity: 0.7;
    }

    .music-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: white;
        color: black;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }
</style>
</head>

<body>
  
<div class="stars">
    <span style="left:5%; animation-duration: 6s;"></span>
    <span style="left:15%; animation-duration: 8s;"></span>
    <span style="left:25%; animation-duration: 10s;"></span>
    <span style="left:35%; animation-duration: 7s;"></span>
    <span style="left:45%; animation-duration: 9s;"></span>
    <span style="left:55%; animation-duration: 11s;"></span>
    <span style="left:65%; animation-duration: 6s;"></span>
    <span style="left:75%; animation-duration: 12s;"></span>
    <span style="left:85%; animation-duration: 8s;"></span>
    <span style="left:95%; animation-duration: 10s;"></span>
</div>

<div class="stars">
    <span style="left:10%; animation-duration: 8s;"></span>
    <span style="left:20%; animation-duration: 12s;"></span>
    <span style="left:30%; animation-duration: 10s;"></span>
    <span style="left:40%; animation-duration: 7s;"></span>
    <span style="left:50%; animation-duration: 9s;"></span>
    <span style="left:60%; animation-duration: 11s;"></span>
    <span style="left:70%; animation-duration: 6s;"></span>
    <span style="left:80%; animation-duration: 13s;"></span>
    <span style="left:90%; animation-duration: 8s;"></span>
</div>

<audio id="bg-music" loop>
    <source src="Anthem.mp3" type="audio/mpeg">
</audio>

<div class="profile fade-in delay-1">
    <img src="Aku.jpg">
    <h1>Beryl</h1>
    <p class="bio">Manusia Biasa</p>
</div>

<div class="links fade-in delay-2">
    <a href="https://instagram.com/brylzzz_" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
    </a>

    <a href="https://tiktok.com/@brilxix" target="_blank">
        <i class="fab fa-tiktok"></i> TikTok
    </a>

    <a href="https://youtube.com/@channelkamu" target="_blank">
        <i class="fab fa-youtube"></i> YouTube
    </a>

    <a href="https://discord.gg/JSuW4pQ8kv" target="_blank">
        <i class="fab fa-discord"></i> Discord
    </a>
</div>

<footer class="fade-in delay-3">
    © 2026 - Dibuat oleh Brilxix
</footer>

<div class="music-btn" onclick="toggleMusic()">🎵
  </div>
  

<script>
const music = document.getElementById("bg-music");

music.volume = 0.3;

function toggleMusic() {
    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}

</script>

</body>
</html>
